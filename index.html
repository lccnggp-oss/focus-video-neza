<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto y Video — Cine Documental de Bodas y XV</title>
    <meta name="description" content="Productora cinematográfica en Nezahualcóyotl. Especialistas en capturar historias reales con equipo 4K y drones en CDMX y EdoMex.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #e0be4f; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }
        .text-gold {color: #d4af37;}
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f1d582 50%, #a17e1a 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); background: rgba(0,0,0,0.6); }
        
        /* Animación de brillo para botones */
        .shine { position: relative; overflow: hidden; }
        .shine::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg); transition: 0.6s;
        }
        .shine:hover::before { left: 150%; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body class="antialiased selection:bg-[#d4af37] selection:text-black">

    <header id="navbar" class="fixed top-0 w-full z-50 transition-all duration-500">
        <nav class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex items-center justify-between h-20">
                <!-- Logo Focus a la IZQUIERDA (texto) -->
                <a href="#inicio" class="serif text-2xl tracking-[0.2em] font-bold group">
                    <span class="text-[#d4af37] group-hover:text-white transition-colors">VIDEO</span> DRON
                </a>
                
                <!-- Menú de navegación centrado (solo en desktop) -->
                <div class="hidden md:flex items-center gap-10 text-[11px] uppercase tracking-[0.2em] font-medium">
                    <a href="#servicios" class="hover:text-[#d4af37] transition">Servicios</a>
                    <a href="#portafolio" class="hover:text-[#d4af37] transition">Potafolio</a>
                    <a href="#paquetes" class="hover:text-[#d4af37] transition">Paquetes</a>
                    <a href="#contacto" class="px-5 py-2.5 border border-[#d4af37]/40 text-[#d4af37] rounded-full hover:bg-[#d4af37] hover:text-black transition-all">Cotizar Evento</a>
                </div>

                <!-- LOGO IMAGEN en esquina SUPERIOR DERECHA (importante) -->
                <img src="logo.png" alt="Logo" class="h-10 w-auto">

                <!-- Botón menú mobile -->
                <button id="menu-btn" class="md:hidden text-[#d4af37]">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8h16M4 16h16"/></svg>
                </button>
            </div>
        </nav>
    </header>

    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-black hidden flex-col items-center justify-center gap-8 text-2xl serif">
        <button id="close-menu" class="absolute top-6 right-6 text-[#d4af37]">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <a href="#servicios" class="mobile-link">Servicios</a>
        <a href="#portafolio" class="mobile-link">Portafolio</a>
        <a href="#paquetes" class="mobile-link">Paquetes</a>
        <a href="#contacto" class="mobile-link text-[#d4af37]">Contacto</a>
    </div>

    <!-- HERO SECTION CON TU VIDEO DRON.MP4 ORIGINAL -->
    <section id="inicio" class="relative h-screen flex items-center justify-center overflow-hidden">
        <!-- Video de Fondo (tu boda.mp4) -->
        <video autoplay loop muted playsinline class="absolute top-0 left-0 w-full h-full object-cover z-0">
            <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAxhbW9vdgAAAGxtdmhkAAAAAAAAAAAAAAAAAAAD6AAAH5QAAQAAAQAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAA[...]"/>
